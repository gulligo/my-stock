<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 주식 장부</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 450px; margin: auto; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .header h2 { margin: 0; font-size: 1.3rem; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border: 1px solid #e9ecef; border-radius: 12px; font-size: 1rem; background-color: #f1f3f5; outline: none; transition: 0.3s; }
        input:focus { border-color: #007bff; background-color: #fff; }
        input[readonly] { background-color: #e9ecef; color: #868e96; cursor: not-allowed; }
        .btn-save { width: 100%; padding: 18px; background-color: #007bff; color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-save:active { background-color: #0056b3; transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>📈</span>
        <h2>종목 등록</h2>
    </div>

    <div class="input-group">
        <input type="text" id="stockName" placeholder="종목명 (예: 삼성전자)" onblur="autoFetchPrice()">
    </div>

    <div class="input-group">
        <input type="text" id="currentPrice" placeholder="현재시세 (자동)" readonly>
    </div>

    <div class="input-group">
        <input type="number" id="buyPrice" placeholder="나의 매수 단가">
    </div>

    <div class="input-group">
        <input type="number" id="stockCount" placeholder="보유 수량">
    </div>

    <button class="btn-save" onclick="saveData()">내 장부에 저장하기</button>
</div>

<script>
    async function autoFetchPrice() {
        const name = document.getElementById('stockName').value.trim();
        const priceInput = document.getElementById('currentPrice');

        if (!name) return;

        priceInput.value = "조회 중...";

        try {
            // 1. 네이버 자동완성 API를 이용해 내부적으로 종목코드 찾기
            const searchUrl = `https://ac.finance.naver.com/ac?q=${encodeURIComponent(name)}&st=1&r_format=json&r_enc=utf-8&r_unicode=1&t_koreng=1&q_enc=utf-8&r_lt=1`;
            const response = await fetch(searchUrl);
            const data = await response.json();
            
            // 검색 결과에서 첫 번째 종목의 코드 추출
            const stockCode = data.items[0][0][0];

            if (stockCode) {
                // 2. 알아낸 코드로 실제 현재가 불러오기 (용용님이 가진 현재가 코드 로직)
                const priceUrl = `https://polling.finance.naver.com/api/realtime?query=SERVICE_ITEM:${stockCode}`;
                const priceResponse = await fetch(priceUrl);
                const priceData = await priceResponse.json();
                
                // 현재 시세 데이터 추출
                const nowPrice = priceData.result.areas[0].datas[0].nv;
                
                // 3. 화면의 현재시세 칸에 바로 넣어주기
                priceInput.value = nowPrice.toLocaleString() + " 원";
            } else {
                priceInput.value = "종목을 찾을 수 없음";
            }
        } catch (error) {
            console.error(error);
            priceInput.value = "조회 실패";
        }
    }

    function saveData() {
        const name = document.getElementById('stockName').value;
        const price = document.getElementById('currentPrice').value;
        
        if(!name || price === "조회 중..." || price === "조회 실패") {
            alert("종목 정보를 먼저 확인해주세요.");
            return;
        }

        alert(name + " 종목의 " + price + " 시세로 저장되었습니다!");
    }
</script>

</body>
</html>
