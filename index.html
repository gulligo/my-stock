<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 주식 관리 앱</title>

<style>
body { font-family: 'Malgun Gothic'; padding:15px; background:#f0f2f5; }
.card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; }
input { padding:12px; margin-bottom:8px; border-radius:8px; border:1px solid #ddd; }
#current { background:#fff9c4; font-weight:bold; }
button { padding:15px; background:#007bff; color:#fff; border:none; border-radius:8px; }
.red { color:red; } .blue { color:blue; }
</style>
</head>

<body>

<div class="card">
<h2>종목 등록</h2>

<input id="name" placeholder="종목명 (예: 삼성전자)">
<input id="code" placeholder="종목번호 6자리" oninput="handleCode(this)">
<div id="status"></div>

<input id="price" placeholder="매수 단가" type="number">
<input id="qty" placeholder="수량" type="number">
<input id="current" placeholder="현재가 자동입력">

<button onclick="save()">저장</button>
</div>

<div id="list"></div>

<script>
let stocks = JSON.parse(localStorage.getItem('stocks')) || [];

function handleCode(el){
    if(el.value.length === 6){
        fetchPrice(el.value);
    }
}

async function fetchPrice(code){
    const status = document.getElementById('status');
    const current = document.getElementById('current');

    status.innerText = "조회중...";

    try{
        const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${code}.KS`);
        const data = await res.json();

        const price = data.chart.result[0].meta.regularMarketPrice;

        if(price){
            current.value = price;
            status.innerText = "자동 입력 완료";
        }else{
            throw new Error();
        }

    }catch{
        status.innerText = "실패 → 직접 입력";
    }
}

function save(){
    const s = {
        id: Date.now(),
        name: name.value,
        code: code.value,
        price: Number(price.value),
        qty: Number(qty.value),
        current: Number(current.value)
    };

    stocks.push(s);
    localStorage.setItem('stocks', JSON.stringify(stocks));
    render();
}

function render(){
    list.innerHTML = "";

    stocks.forEach(s=>{
        const profit = (s.current - s.price) * s.qty;
        const rate = ((s.current - s.price)/s.price*100).toFixed(2);

        list.innerHTML += `
        <div class="card">
        ${s.name} (${s.code})<br>
        수익: <span class="${profit>=0?'red':'blue'}">
        ${profit}원 (${rate}%)
        </span>
        </div>`;
    });
}

render();
</script>

</body>
</html>
