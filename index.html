 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 매매 관리</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .result-list { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .stock-item { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .profit { color: red; font-weight: bold; }
        .loss { color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>나의 주식 관리</h2>
    
    <div class="input-group">
        <label>종목명</label>
        <input type="text" id="stockName" placeholder="예: 삼성전자">
    </div>
    <div class="input-group">
        <label>매수가 (평균단가)</label>
        <input type="number" id="buyPrice" placeholder="0">
    </div>
    <div class="input-group">
        <label>현재가</label>
        <input type="number" id="currentPrice" placeholder="0">
    </div>
    <div class="input-group">
        <label>보유 수량</label>
        <input type="number" id="stockCount" placeholder="0">
    </div>
    
    <button onclick="addStock()">종목 추가 및 계산</button>

    <div class="result-list" id="resultList">
        </div>
</div>

<script>
    function addStock() {
        const name = document.getElementById('stockName').value;
        const buyPrice = Number(document.getElementById('buyPrice').value);
        const currentPrice = Number(document.getElementById('currentPrice').value);
        const count = Number(document.getElementById('stockCount').value);

        if(!name || !buyPrice || !currentPrice || !count) {
            alert("모든 항목을 입력해주세요.");
            return;
        }

        // 계산 로직
        const totalBuy = buyPrice * count;
        const totalCurrent = currentPrice * count;
        const profitMoney = totalCurrent - totalBuy;
        const profitRate = ((profitMoney / totalBuy) * 100).toFixed(2);

        // 결과 표시용 HTML 생성
        const resultDiv = document.getElementById('resultList');
        const stockItem = document.createElement('div');
        stockItem.className = 'stock-item';
        
        const profitClass = profitMoney >= 0 ? 'profit' : 'loss';

        stockItem.innerHTML = `
            <strong>${name}</strong> (${count}주)<br>
            투자금: ${totalBuy.toLocaleString()}원<br>
            현재가치: ${totalCurrent.toLocaleString()}원<br>
            수익: <span class="${profitClass}">${profitMoney.toLocaleString()}원 (${profitRate}%)</span>
        `;

        resultDiv.prepend(stockItem);

        // 입력창 초기화
        document.getElementById('stockName').value = '';
        document.getElementById('buyPrice').value = '';
        document.getElementById('currentPrice').value = '';
        document.getElementById('stockCount').value = '';
    }
</script>

</body>
</html>
