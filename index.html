<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주식 관리 장부</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background-color: #f0f4f8; margin: 0; }
        .card { background: white; padding: 22px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h2 { font-size: 22px; color: #1a1a1a; margin: 0 0 18px 0; border-bottom: 4px solid #007bff; padding-bottom: 12px; }
        .input-box { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 18px; border: 1px solid #ddd; border-radius: 12px; font-size: 18px; }
        input:read-only { background-color: #e9ecef; color: #007bff; font-weight: bold; }
        #status-msg { font-size: 15px; font-weight: bold; min-height: 22px; text-align: center; margin: 5px 0; }
        .save-btn { padding: 22px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 20px; cursor: pointer; }
        .stock-item { background: white; padding: 20px; border-radius: 15px; margin-bottom: 12px; border-left: 10px solid #28a745; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .red { color: #d9534f; } .blue { color: #0275d8; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; }
        .summary-value { font-size: 19px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 내 자산 현황</h2>
    <div class="summary-grid">
        <div class="summary-item"><span>매수합계</span><div id="totalBuy" class="summary-value">0원</div></div>
        <div class="summary-item"><span>평가합계</span><div id="totalEval" class="summary-value">0원</div></div>
        <div class="summary-item" style="grid-column: span 2;"><span>전체 손익</span><div id="totalProfit" class="summary-value">0원 (0%)</div></div>
    </div>
</div>

<div class="card">
    <h2>📈 종목 등록</h2>
    <div class="input-box">
        <input type="text" id="name" placeholder="종목명 (예: 삼성전자)" onblur="startSearch()" onkeypress="if(event.keyCode==13) startSearch()">
        <div id="status-msg"></div>
        <input type="text" id="code" placeholder="종목번호 (자동 입력)" readonly>
        <input type="number" id="current" placeholder="현재가 (자동 입력)" readonly>
        <input type="number" id="price" placeholder="매수 단가">
        <input type="number" id="qty" placeholder="수량">
    </div>
    <button class="save-btn" onclick="saveStock()">내 장부에 저장하기</button>
</div>

<div id="stockList"></div>

<script>
    let stocks = JSON.parse(localStorage.getItem('myStocks')) || [];

    async function startSearch() {
        const name = document.getElementById('name').value;
        const codeInput = document.getElementById('code');
        const currentInput = document.getElementById('current');
        const statusMsg = document.getElementById('status-msg');

        if (!name) return;
        statusMsg.style.color = "#007bff";
        statusMsg.innerText = "🔍 정보를 찾는 중입니다...";

        try {
            // 야후 파이낸스 검색 경로
            const searchUrl = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(name)}&quotesCount=1`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`;
            
            const res = await fetch(proxyUrl);
            const data = await res.json();
            const result = JSON.parse(data.contents);
            
            if (result.quotes && result.quotes.length > 0) {
                const symbol = result.quotes[0].symbol;
                codeInput.value = symbol.split('.')[0]; // 6자리 번호 입력
                
                // 현재가 수집
                const priceUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
                const proxyPriceUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(priceUrl)}`;
                
                const pRes = await fetch(proxyPriceUrl);
                const pData = await pRes.json();
                const pResult = JSON.parse(pData.contents);
                const price = pResult.chart.result[0].meta.regularMarketPrice;

                if (price) {
                    currentInput.value = price;
                    statusMsg.style.color = "#28a745";
                    statusMsg.innerText = "✅ 자동 입력 완료!";
                }
            } else {
                statusMsg.style.color = "#d9534f";
                statusMsg.innerText = "❌ 종목명을 다시 확인해주세요.";
            }
        } catch (e) {
            statusMsg.style.color = "#f0ad4e";
            statusMsg.innerText = "⚠️ 연결 지연.. 다시 시도 중";
            setTimeout(startSearch, 1500); 
        }
    }

    function saveStock() {
        const s = {
            id: Date.now(),
            name: document.getElementById('name').value,
            code: document.getElementById('code').value,
            price: Number(document.getElementById('price').value),
            qty: Number(document.getElementById('qty').value),
            current: Number(document.getElementById('current').value)
        };
        if(!s.name || !s.price || !s.qty) return alert("매수가와 수량을 채워주세요!");
        stocks.push(s);
        localStorage.setItem('myStocks', JSON.stringify(stocks));
        render();
        
        ['name','code','price','qty','current'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('status-msg').innerText = '';
        alert("장부에 저장되었습니다!");
    }

    function render() {
        let tBuy = 0, tEval = 0;
        const listDiv = document.getElementById('stockList');
        listDiv.innerHTML = '';

        stocks.forEach(s => {
            tBuy += (s.price * s.qty);
            tEval += (s.current * s.qty);
            const profit = (s.current - s.price) * s.qty;
            const rate = ((s.current - s.price) / s.price * 100).toFixed(2);
            
            listDiv.innerHTML += `<div class="stock-item">
                <div style="display:flex; justify-content:space-between;">
                    <div><b style="font-size:20px;">${s.name}</b> <small>(${s.code})</small><br>${s.qty}주</div>
                    <div style="text-align:right">
                        <span class="${profit >= 0 ? 'red' : 'blue'}" style="font-weight:bold; font-size:18px;">
                            ${profit > 0 ? '+' : ''}${profit.toLocaleString()}원<br>(${rate}%)
                        </span>
                    </div>
                </div>
                <button onclick="deleteStock(${s.id})" style="margin-top:15px; width:100%; padding:10px; background:#f8f9fa; border:1px solid #ddd; border-radius:8px; color:#999;">삭제하기</button>
            </div>`;
        });

        const tProfit = tEval - tBuy;
        const tRate = tBuy === 0 ? 0 : ((tProfit / tBuy) * 100).toFixed(2);
        document.getElementById('totalBuy').innerText = tBuy.toLocaleString() + '원';
        document.getElementById('totalEval').innerText = tEval.toLocaleString() + '원';
        const pEl = document.getElementById('totalProfit');
        pEl.innerText = `${tProfit.toLocaleString()}원 (${tRate}%)`;
        pEl.className = 'summary-value ' + (tProfit >= 0 ? 'red' : 'blue');
    }

    function deleteStock(id) {
        if(confirm("삭제할까요?")) {
            stocks = stocks.filter(s => s.id !== id);
            localStorage.setItem('myStocks', JSON.stringify(stocks));
            render();
        }
    }
    window.onload = render;
</script>
</body>
</html>
