<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 주식 장부</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 1.2rem; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input[readonly] { background-color: #eee; }
        button { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="card">
    <h2>📈 종목 등록</h2>
    
    <div class="input-group">
        <input type="text" id="stockName" placeholder="종목명 입력 (예: 삼성전자)" onchange="getPriceAuto()">
    </div>

    <div class="input-group">
        <input type="text" id="currentPrice" placeholder="현재시세 (자동)" readonly>
    </div>

    <div class="input-group">
        <input type="number" id="buyPrice" placeholder="나의 매수 단가">
    </div>

    <div class="input-group">
        <input type="number" id="stockCount" placeholder="보유 수량">
    </div>

    <button onclick="saveToLedger()">내 장부에 저장하기</button>
</div>

<script>
    // 종목명으로 가격을 바로 가져오는 함수
    async function getPriceAuto() {
        const name = document.getElementById('stockName').value;
        const priceInput = document.getElementById('currentPrice');

        if (!name) return;

        priceInput.value = "불러오는 중...";

        try {
            // 1. 이름으로 종목코드를 내부적으로 찾기
            // (실제 API 주소는 사용하시는 것으로 교체 가능합니다)
            const response = await fetch(`https://실제-API-주소/search?name=${name}`);
            const data = await response.json();

            if (data && data.price) {
                // 2. 번호는 보여주지 않고 가격만 바로 표시
                priceInput.value = data.price.toLocaleString() + " 원";
            } else {
                priceInput.value = "가격을 찾지 못함";
            }
        } catch (e) {
            // 테스트용 예시 데이터 (연결 안 될 경우)
            if(name === "삼성전자") priceInput.value = "75,000 원";
            else priceInput.value = "조회 실패";
        }
    }

    function saveToLedger() {
        alert("장부에 저장되었습니다!");
        // 저장 로직 추가 부분
    }
</script>

</body>
</html>
