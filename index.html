<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주식 수익 관리</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f6fa}
h2{margin-bottom:10px}
input,button,select{width:100%;padding:10px;margin-top:8px;font-size:16px}
#result{margin-top:15px;font-size:20px;font-weight:bold}
.list{margin-top:20px}
.item{padding:10px;margin-top:6px;border-radius:10px;background:#fff}
.red{color:red}
.blue{color:blue}
.summary{margin-top:20px;font-size:18px;font-weight:bold}
</style>
</head>
<body>

<h2>📈 주식 수익 관리</h2>

<select id="type">
  <option value="buy">매수</option>
  <option value="sell">매도</option>
</select>

<input type="text" id="name" placeholder="종목명">
<input type="number" id="price" placeholder="가격">
<input type="number" id="qty" placeholder="수량">

<button onclick="addTrade()">저장</button>

<div id="result"></div>

<div class="summary" id="summary"></div>

<div class="list" id="list"></div>

<script>
let trades = JSON.parse(localStorage.getItem("trades") || "[]");

function save(){
  localStorage.setItem("trades", JSON.stringify(trades));
}

function addTrade(){
  let type = document.getElementById("type").value;
  let name = document.getElementById("name").value;
  let price = parseFloat(document.getElementById("price").value);
  let qty = parseFloat(document.getElementById("qty").value);

  if(!name || !price || !qty){
    alert("값 입력");
    return;
  }

  let trade = {
    date: new Date().toLocaleString(),
    type, name, price, qty
  };

  trades.push(trade);
  save();
  render();
}

function render(){
  let list = document.getElementById("list");
  let summary = document.getElementById("summary");

  list.innerHTML = "";

  let grouped = {};

  trades.forEach(t=>{
    if(!grouped[t.name]) grouped[t.name]=[];
    grouped[t.name].push(t);
  });

  let totalProfit = 0;
  let totalCount = 0;

  for(let name in grouped){
    let arr = grouped[name];

    let buyTotal = 0;
    let buyQty = 0;
    let sellTotal = 0;
    let sellQty = 0;

    arr.forEach(t=>{
      if(t.type=="buy"){
        buyTotal += t.price * t.qty;
        buyQty += t.qty;
      }else{
        sellTotal += t.price * t.qty;
        sellQty += t.qty;
      }
    });

    let profit = sellTotal - buyTotal;
    let rate = buyTotal ? (profit / buyTotal * 100) : 0;

    if(buyQty>0 || sellQty>0){
      totalProfit += profit;
      totalCount++;
    }

    let div = document.createElement("div");
    div.className = "item";

    let color = profit>=0 ? "red" : "blue";

    div.innerHTML = `
      <b>${name}</b><br>
      수익금: <span class="${color}">${Math.floor(profit)}원</span><br>
      수익률: <span class="${color}">${rate.toFixed(2)}%</span><br>
      <small>${arr.map(t=>`${t.type} ${t.qty}@${t.price}`).join(" | ")}</small>
    `;

    list.appendChild(div);
  }

  let avg = totalCount ? totalProfit / totalCount : 0;

  summary.innerHTML = `
    총 수익: ${Math.floor(totalProfit)}원<br>
    평균 수익: ${Math.floor(avg)}원
  `;
}

render();
</script>

</body>
</html>
