<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 주식 장부</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background-color: #f0f4f8; margin: 0; }
        .card { background: white; padding: 22px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h2 { font-size: 22px; color: #1a1a1a; margin: 0 0 18px 0; border-bottom: 4px solid #007bff; padding-bottom: 12px; }
        .input-box { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 18px; border: 1px solid #ddd; border-radius: 12px; font-size: 18px; outline: none; }
        input:read-only { background-color: #f1f3f5; color: #007bff; font-weight: bold; }
        #status-msg { font-size: 15px; font-weight: bold; min-height: 22px; text-align: center; margin: 5px 0; }
        .save-btn { padding: 22px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 20px; cursor: pointer; }
        .stock-item { background: white; padding: 20px; border-radius: 15px; margin-bottom: 12px; border-left: 10px solid #28a745; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .red { color: #d9534f; } .blue { color: #0275d8; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; }
        .summary-value { font-size: 19px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 내 자산 현황</h2>
    <div class="summary-grid">
        <div class="summary-item"><span>매수합계</span><div id="totalBuy" class="summary-value">0원</div></div>
        <div class="summary-item"><span>평가합계</span><div id="totalEval" class="summary-value">0원</div></div>
        <div class="summary-item" style="grid-column: span 2;"><span>전체 손익</span><div id="totalProfit" class="summary-value">0원 (0%)</div></div>
    </div>
</div>

<div class="card">
    <h2>📈 종목 등록</h2>
    <div class="input-box">
        <input type="text" id="name" placeholder="종목명 (예: 삼성전자)" onchange="autoSearch()">
        <div id="status-msg"></div>
        <input type="text" id="code" placeholder="종목번호 (자동)" readonly>
        <input type="number" id="current" placeholder="현재시세 (자동)" readonly>
        <input type="number" id="price" placeholder="나의 매수 단가">
        <input type="number" id="qty" placeholder="보유 수량">
    </div>
    <button class="save-btn" onclick="saveStock()">내 장부에 저장하기</button>
</div>

<div id="stockList"></div>

<script>
    let stocks = JSON.parse(localStorage.getItem('myStocks')) || [];

    async function autoSearch() {
        const nameInput = document.getElementById('name');
        const name = nameInput.value.trim();
        const codeInput = document.getElementById('code');
        const currentInput = document.getElementById('current');
        const statusMsg = document.getElementById('status-msg');

        if (!name) return;
        statusMsg.style.color = "#007bff";
        statusMsg.innerText = "🔍 최신 정보를 가져오는 중...";

        const searchQuery = name === "삼성전자" ? "005930.KS" : name;

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + searchQuery)}`);
            const data = await res.json();
            const result = JSON.parse(data.contents);
            
            const price = result.chart.result[0].meta.regularMarketPrice;
            const symbol = result.chart.result[0].meta.symbol;

            if (price) {
                codeInput.value = symbol.split('.')[0];
                currentInput.value = price;
                statusMsg.style.color = "#28a745";
                statusMsg.innerText = "✅ 자동 입력 완료!";
            }
        } catch (e) {
            statusMsg.style.color = "#f0ad4e";
            statusMsg.innerText = "⚠️ 다시 입력해주시거나 잠시 기다려주세요.";
        }
    }

    function saveStock() {
        const nameVal = document.getElementById('name').value.trim();
        const priceVal = Number(document.getElementById('price').value);
        const qtyVal = Number(document.getElementById('qty').value);
        const currentVal = Number(document.getElementById('current').value);
        const codeVal = document.getElementById('code').value;

        if(!nameVal || !priceVal || !qtyVal) return alert("매수가와 수량을 채워주세요!");

        const s = {
            id: Date.now(),
            name: nameVal, // 사용자가 입력한 이름만 저장
            code: codeVal,
            price: priceVal,
            qty: qtyVal,
            current: currentVal
        };

        stocks.push(s);
        localStorage.setItem('myStocks', JSON.stringify(stocks));
        render();
        
        ['name','code','price','qty','current'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('status-msg').innerText = '';
    }

    function render() {
        let tBuy = 0, tEval = 0;
        const listDiv = document.getElementById('stockList');
        listDiv.innerHTML = '';

        stocks.forEach(s => {
            const buyTotal = s.price * s.qty;
            const evalTotal = s.current * s.qty;
            tBuy += buyTotal;
            tEval += evalTotal;

            const profit = evalTotal - buyTotal;
            const rate = buyTotal === 0 ? 0 : (profit / buyTotal * 100).toFixed(2);
            
            listDiv.innerHTML += `<div class="stock-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b style="font-size:20px; color:#1a1a1a;">${s.name}</b><br>
                        <span style="color:#666; font-size:15px;">${s.qty.toLocaleString()}주 보유</span>
                    </div>
                    <div style="text-align:right">
                        <span class="${profit >= 0 ? 'red' : 'blue'}" style="font-weight:bold; font-size:18px;">
                            ${profit > 0 ? '+' : ''}${profit.toLocaleString()}원<br>
                            (${rate}%)
                        </span>
                    </div>
                </div>
                <button onclick="deleteStock(${s.id})" style="margin-top:15px; width:100%; padding:12px; background:#f8f9fa; border:1px solid #ddd; border-radius:8px; color:#999; font-size:14px;">장부에서 삭제</button>
            </div>`;
        });

        const tProfit = tEval - tBuy;
        const tRate = tBuy === 0 ? 0 :
